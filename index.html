<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Exposure Launcher</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0d10;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width: min(560px, 92vw);
      border: 1px solid #2a2f37;
      border-radius: 14px;
      padding: 22px;
      background: #11161c;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p { margin: 8px 0; line-height: 1.45; color: #b8c2cc; }
    a {
      color: #86c5ff;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Launching Quantum Exposure (FULL mode)...</h1>
    <p>If you are not redirected automatically, <a id="openLink" href="/webapps/quantum_exposure/dashboard.html">open the dashboard</a>.</p>
    <p>This launcher sets local runtime mode to FULL for this package.</p>
  </div>
  <script>
    (function () {
      try {
        window.localStorage.setItem("quantum-research-dashboard-runtime-mode-v1", "full");
      } catch (_err) {
        // Ignore storage failures and continue.
      }
      const target = "/webapps/quantum_exposure/dashboard.html";
      document.getElementById("openLink").setAttribute("href", target);
      window.location.replace(target);
    })();
  </script>
</body>
</html>
